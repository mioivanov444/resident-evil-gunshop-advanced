{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">{{ title|default:"Edit Review" }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-danger">Save Changes</button>
        {% if gun %}
            <a href="{% url 'gun_detail' gun.slug %}" class="btn btn-secondary ms-2">Cancel</a>
        {% elif object %}
            <a href="{% url 'gun_detail' object.gun.slug %}" class="btn btn-secondary ms-2">Cancel</a>
        {% endif %}
    </form>
</div>
{% endblock %}
